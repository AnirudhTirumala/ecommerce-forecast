name: E-commerce Forecast CI/CD

# Trigger workflow on pushes or pull requests to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Optional linting
      - name: Lint with flake8
        if: success()  # Only run if previous steps succeed
        run: |
          pip install flake8
          flake8 src/ app.py

      # Step 5: Run preprocessing & training scripts
      - name: Run preprocessing
        run: python src/preprocess.py

      - name: Train model
        run: python src/train.py

      # Step 6: Run tests (if you have a tests/ folder)
      - name: Run tests
        if: success()
        run: |
          if [ -d "tests" ]; then
            pip install pytest
            pytest tests/
          else
            echo "No tests folder found, skipping."
          fi

      # Step 7: Upload trained model as artifact
      - name: Upload model artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.pkl

